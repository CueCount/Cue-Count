# ── Trend ─────────────────────────────────────────────────────────────────────
type Trend @table {
  id:           UUID!      @default(expr: "uuidV4()")
  trendId:      String!    @unique
  trendDataId:  String!    @unique
  name:         String!
  unit:         String
  denomination: Float
  frequency:    String!
  source:       String!
  apiDataId:    String
  createdAt:    Timestamp! @default(expr: "request.time")
  updatedAt:    Timestamp! @default(expr: "request.time")
}

# ── TrendData ─────────────────────────────────────────────────────────────────
type TrendData @table {
  id:          UUID!       @default(expr: "uuidV4()")
  trendDataId: String!
  value:       Float!
  timestamp:   Timestamp!
}

# ── Data ──────────────────────────────────────────────────────────────────────
type Data @table {
  id:        UUID!      @default(expr: "uuidV4()")
  dataId:    String!
  value:     Float!
  timestamp: Timestamp!
}

# ── WeightData ────────────────────────────────────────────────────────────────
type WeightData @table {
  id:        UUID!      @default(expr: "uuidV4()")
  dataId:    String!
  value:     Float!
  timestamp: Timestamp!
}

# ── LagData ───────────────────────────────────────────────────────────────────
type LagData @table {
  id:        UUID!      @default(expr: "uuidV4()")
  dataId:    String!
  value:     Float!
  timestamp: Timestamp!
}

# ── CorrelationData ───────────────────────────────────────────────────────────
# value ranges from -1.0 (perfectly inversely correlated) to 1.0 (perfectly
# directly correlated). Negative = inverse, positive = direct.
type CorrelationData @table {
  id:        UUID!      @default(expr: "uuidV4()")
  dataId:    String!
  value:     Float!
  timestamp: Timestamp!
}

# ── StoryReference ────────────────────────────────────────────────────────────
type StoryReference @table {
  id:                UUID!      @default(expr: "uuidV4()")
  storyDocId:        String!
  name:              String!
  analysisNumber:    Int!       @default(expr: "0")
  contributorNumber: Int!       @default(expr: "0")
  createdAt:         Timestamp! @default(expr: "request.time")
}