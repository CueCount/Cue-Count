# queries.gql — Firebase Data Connect
# Mirrors DataState initStory steps exactly.
# Step 2.5 → GetTrendsByIds + GetTrendDataByTrendDataIds
# Step 4   → GetDataByDataIds + GetWeightDataByDataIds + GetLagDataByDataIds
#            + GetCorrelationDataByDataIds
# Search   → SearchTrends + SearchStoryReferences

# ── GetTrendsByIds ────────────────────────────────────────────────────────────
# initStory Step 2.5 — resolve trendId → Trend metadata
query GetTrendsByIds($ids: [String!]!) @auth(level: USER) {
  trends(where: { trendId: { in: $ids } }) {
    id
    trendId
    trendDataId
    name
    unit
    denomination
    frequency
    source
    apiDataId
    createdAt
    updatedAt
  }
}

# ── GetTrendDataByTrendDataIds ────────────────────────────────────────────────
# initStory Step 2.5 — fetch time-series rows for resolved trends
query GetTrendDataByTrendDataIds($trendDataIds: [String!]!) @auth(level: USER) {
  trendDatas(
    where: { trendDataId: { in: $trendDataIds } }
    orderBy: [{ timestamp: ASC }]
    limit: 100000
  ) {
    trendDataId
    timestamp
    value
  }
}

# Fetch a single trend by its trendDataId — used by importTrend.ts
query GetTrendByTrendDataId($trendDataId: String!) @auth(level: PUBLIC) {
  trends(where: { trendDataId: { eq: $trendDataId } }, limit: 1) {
    id
    trendDataId
    name
    unit
    denomination
    frequency
    source
    apiDataId
    syncedAt
    createdAt
    updatedAt
  }
}

# ── GetDataByDataIds ──────────────────────────────────────────────────────────
# initStory Step 4 — user-specific analysis data values
query GetDataByDataIds($dataIds: [String!]!) @auth(level: USER) {
  datas(
    where: { dataId: { in: $dataIds } }
    orderBy: { timestamp: ASC }
    limit: 100000
  ) {
    id
    dataId
    value
    timestamp
  }
}

