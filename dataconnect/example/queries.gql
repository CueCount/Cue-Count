# ── SearchTrends ──────────────────────────────────────────────────────────────
# Add Contributor modal — search Trend table by name
query SearchTrends($query: String!) @auth(level: USER) {
  trends(
    where: { name: { contains: $query } }
    limit: 10
  ) {
    id
    trendId
    name
    unit
    denomination
    source
    trendDataId
  }
}

# ── SearchStoryReferences ─────────────────────────────────────────────────────
# Add Contributor modal — search StoryReference table by name
query SearchStoryReferences($query: String!) @auth(level: USER) {
  storyReferences(
    where: { name: { contains: $query } }
    limit: 10
  ) {
    id
    name
    analysisNumber
    contributorNumber
    storyDocId
  }
}

query GetLatestTrendDataTimestamp($trendDataId: String!) @auth(level: PUBLIC) {
  trendDatas(
    where: { trendDataId: { eq: $trendDataId } }
    orderBy: { timestamp: DESC }
    limit: 1
  ) {
    timestamp
  }
}