# mutations.gql — Firebase Data Connect
# One upsert per value table — all keyed by dataId + timestamp.
# Called by onDragEnd in StoryGraph and by the Save action.

# ── UpsertData ────────────────────────────────────────────────────────────────
# activeEditSeries === "merged" — contributor data points or story analysis values
mutation UpsertData(
  $id:        UUID!
  $dataId:    String!
  $value:     Float!
  $timestamp: Timestamp!
) @auth(level: USER) {
  data_upsert(data: {
    id:        $id
    dataId:    $dataId
    value:     $value
    timestamp: $timestamp
  })
}

