# ── DeleteData ────────────────────────────────────────────────────────────────
# Used when unlinking a contributor — clean up all its value rows
mutation DeleteDataByDataId($dataId: String!) @auth(level: USER) {
  data_deleteMany(where: { dataId: { eq: $dataId } })
}

mutation DeleteWeightDataByDataId($dataId: String!) @auth(level: USER) {
  weightData_deleteMany(where: { dataId: { eq: $dataId } })
}

mutation DeleteLagDataByDataId($dataId: String!) @auth(level: USER) {
